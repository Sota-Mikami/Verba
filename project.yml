name: Verba
options:
  bundleIdPrefix: com.sotamikami
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "0.9.0"
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    branch: main
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  Verba:
    type: application
    platform: macOS
    sources:
      - Verba
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sotamikami.verba
        MARKETING_VERSION: "0.6.3"
        CURRENT_PROJECT_VERSION: 33
        INFOPLIST_FILE: Verba/Info.plist
        CODE_SIGN_ENTITLEMENTS: Verba/Verba.entitlements
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
      configs:
        Debug:
          ASSETCATALOG_COMPILER_APPICON_NAME: AppIconDev
          PRODUCT_BUNDLE_IDENTIFIER: com.sotamikami.verba.dev
          PRODUCT_NAME: Verba Dev
        Release:
          ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: KeyboardShortcuts
      - package: WhisperKit
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: Sparkle
    entitlements:
      path: Verba/Verba.entitlements
      properties:
        com.apple.developer.kernel.increased-memory-limit: true
        com.apple.security.device.audio-input: true
        com.apple.security.network.client: true
